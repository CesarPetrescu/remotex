name: remotex

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SEARCH_POSTGRES_DB:-remotex}
      POSTGRES_USER: ${SEARCH_POSTGRES_USER:-remotex}
      POSTGRES_PASSWORD: ${SEARCH_POSTGRES_PASSWORD:-remotex-search}
    volumes:
      - search-data:/var/lib/postgresql/data
    networks:
      - remotex
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SEARCH_POSTGRES_USER:-remotex} -d ${SEARCH_POSTGRES_DB:-remotex}"]
      interval: 10s
      timeout: 5s
      retries: 5

  relay:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.relay
    image: remotex/relay:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Etc/UTC}
      RELAY_CLIENT_RECONNECT_GRACE_SECONDS: ${RELAY_CLIENT_RECONNECT_GRACE_SECONDS:-75}
      SEARCH_DATABASE_URL: postgresql://${SEARCH_POSTGRES_USER:-remotex}:${SEARCH_POSTGRES_PASSWORD:-remotex-search}@postgres:5432/${SEARCH_POSTGRES_DB:-remotex}
      EMBEDDING_API_BASE_URL: ${EMBEDDING_API_BASE_URL:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-qwen3-embedding}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-4096}
      EMBEDDING_MAX_CONTEXT_TOKENS: ${EMBEDDING_MAX_CONTEXT_TOKENS:-32768}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-16}
      RERANKER_API_BASE_URL: ${RERANKER_API_BASE_URL:-}
      RERANKER_API_KEY: ${RERANKER_API_KEY:-}
      RERANKER_MODEL: ${RERANKER_MODEL:-qwen3-reranker}
      SEARCH_RERANK_POOL: ${SEARCH_RERANK_POOL:-50}
      SEARCH_RERANK_TOP_N: ${SEARCH_RERANK_TOP_N:-20}
      MAIN_MODEL_API_BASE_URL: ${MAIN_MODEL_API_BASE_URL:-}
      MAIN_MODEL_API_KEY: ${MAIN_MODEL_API_KEY:-}
      MAIN_MODEL: ${MAIN_MODEL:-MainModel}
      MAIN_MODEL_CONTEXT_TOKENS: ${MAIN_MODEL_CONTEXT_TOKENS:-16000}
      MAIN_MODEL_DISABLE_THINKING_STYLE: ${MAIN_MODEL_DISABLE_THINKING_STYLE:-chat_template_kwargs}
      CHAT_TITLE_ENABLED: ${CHAT_TITLE_ENABLED:-1}
      CHAT_TITLE_MAX_INPUT_TOKENS: ${CHAT_TITLE_MAX_INPUT_TOKENS:-12000}
      CHAT_TITLE_MAX_ATTEMPTS: ${CHAT_TITLE_MAX_ATTEMPTS:-8}
    volumes:
      - relay-data:/data
    ports:
      # Bind to localhost only by default; front with Caddy (profile `tls`)
      # or your own reverse proxy for anything public. Override the host
      # port with RELAY_HOST_PORT=… if :8080 is already taken.
      - "${RELAY_HOST_BIND:-127.0.0.1}:${RELAY_HOST_PORT:-8080}:8080"
    networks:
      - remotex
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    profiles: ["tls"]
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - relay
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      REMOTEX_HOSTNAME: ${REMOTEX_HOSTNAME:-localhost}
    networks:
      - remotex

volumes:
  relay-data:
  search-data:
  caddy-data:
  caddy-config:

networks:
  remotex:
    driver: bridge
