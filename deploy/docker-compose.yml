name: remotex

services:
  postgres:
    # Keep the pgvector image: the existing named volume was initialized
    # by it. Plain postgres:16 would also mount this PG16 cluster (the
    # pgvector image is postgres:16 + the extension), but staying on
    # pgvector/pgvector:pg16 guarantees zero volume-compat risk now that
    # no vector columns remain. Only inventory (users/hosts/sessions) lives
    # here.
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-remotex}
      POSTGRES_USER: ${POSTGRES_USER:-remotex}
      # Default kept as the original SEARCH_POSTGRES_PASSWORD value so the
      # already-initialized named volume still authenticates.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-remotex-search}
    volumes:
      - search-data:/var/lib/postgresql/data
    networks:
      - remotex
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-remotex} -d ${POSTGRES_DB:-remotex}"]
      interval: 10s
      timeout: 5s
      retries: 5

  relay:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.relay
    image: remotex/relay:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Etc/UTC}
      RELAY_CLIENT_RECONNECT_GRACE_SECONDS: ${RELAY_CLIENT_RECONNECT_GRACE_SECONDS:-75}
      # Inventory (users/hosts/sessions) lives in the Postgres container.
      RELAY_DATABASE_URL: postgresql://${POSTGRES_USER:-remotex}:${POSTGRES_PASSWORD:-remotex-search}@postgres:5432/${POSTGRES_DB:-remotex}
    ports:
      # Bind to localhost only by default; front with Caddy (profile `tls`)
      # or your own reverse proxy for anything public. Override the host
      # port with RELAY_HOST_PORT=… if :8080 is already taken.
      - "${RELAY_HOST_BIND:-127.0.0.1}:${RELAY_HOST_PORT:-8080}:8080"
    volumes:
      # Legacy: pre-Postgres installs stored inventory in
      # /data/relay.db (SQLite). The relay's startup migrator imports
      # it once into Postgres and renames the file to .migrated so
      # subsequent boots skip the import. Safe to omit on fresh
      # installs; required to avoid silent data loss when upgrading
      # an old box.
      - relay-data:/data
    networks:
      - remotex
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    profiles: ["tls"]
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - relay
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      REMOTEX_HOSTNAME: ${REMOTEX_HOSTNAME:-localhost}
    networks:
      - remotex

volumes:
  search-data:
  relay-data:
  caddy-data:
  caddy-config:

networks:
  remotex:
    driver: bridge
