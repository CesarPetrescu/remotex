name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-lint:
    name: Web · ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  web-build:
    name: Web · Vite build
    runs-on: ubuntu-latest
    needs: web-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build

  web-audit:
    name: Web · npm audit (prod)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm audit --omit=dev

  backend-lint:
    name: Backend · ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: prototype/requirements-dev.txt
      - name: Install dev deps
        run: pip install -r prototype/requirements-dev.txt
      - name: Ruff check
        working-directory: prototype
        run: ruff check .

  backend-e2e:
    name: Backend · relay <-> daemon e2e
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: prototype/requirements.txt
      - name: Install runtime deps
        run: pip install -r prototype/requirements.txt
      - name: Run e2e test
        working-directory: prototype
        run: python scripts/e2e_test.py

  # Android CI is gated: no native project exists yet (AndroidPanel.jsx is
  # a React wireframe, not Kotlin/Gradle). This job activates as soon as
  # an android/ directory with a Gradle wrapper lands in the repo, so the
  # first Android PR gets CI for free without a workflow edit.
  android:
    name: Android · Gradle (gated)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: check
        shell: bash
        run: |
          if [ -f android/gradlew ]; then
            echo "has_android=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_android=false" >> "$GITHUB_OUTPUT"
            echo "No android/gradlew found — skipping Android build."
          fi
      - uses: actions/setup-java@v4
        if: steps.check.outputs.has_android == 'true'
        with:
          distribution: temurin
          java-version: "21"
      - name: Gradle lint + assemble
        if: steps.check.outputs.has_android == 'true'
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew lint assembleDebug --no-daemon
