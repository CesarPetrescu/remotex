name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-lint:
    name: Web · ESLint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace:
          - { name: wireframes, dir: "." }
          - { name: client, dir: "apps/web" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.workspace.dir }}/package-lock.json
      - working-directory: ${{ matrix.workspace.dir }}
        run: npm ci
      - working-directory: ${{ matrix.workspace.dir }}
        run: npm run lint

  web-build:
    name: Web · Vite build
    runs-on: ubuntu-latest
    needs: web-lint
    strategy:
      matrix:
        workspace:
          - { name: wireframes, dir: "." }
          - { name: client, dir: "apps/web" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.workspace.dir }}/package-lock.json
      - working-directory: ${{ matrix.workspace.dir }}
        run: npm ci
      - working-directory: ${{ matrix.workspace.dir }}
        run: npm run build

  web-audit:
    name: Web · npm audit (prod)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace:
          - { name: wireframes, dir: "." }
          - { name: client, dir: "apps/web" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.workspace.dir }}/package-lock.json
      - working-directory: ${{ matrix.workspace.dir }}
        run: npm ci
      - working-directory: ${{ matrix.workspace.dir }}
        run: npm audit --omit=dev

  backend-lint:
    name: Backend · ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/requirements-dev.txt
      - name: Install dev deps
        run: pip install -r services/requirements-dev.txt
      - name: Ruff check
        working-directory: services
        run: ruff check .

  backend-tests:
    name: Backend · pytest
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/requirements-dev.txt
      - name: Install dev deps
        run: pip install -r services/requirements-dev.txt
      - name: Run unit tests
        working-directory: services
        run: pytest tests -v

  backend-e2e:
    name: Backend · relay <-> daemon e2e
    runs-on: ubuntu-latest
    needs: backend-lint
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: remotex
          POSTGRES_USER: remotex
          POSTGRES_PASSWORD: remotex-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U remotex"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    env:
      E2E_DATABASE_URL: postgresql://remotex:remotex-test@127.0.0.1:5432/remotex
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/requirements.txt
      - name: Install runtime deps
        run: pip install -r services/requirements.txt
      - name: Run e2e test
        working-directory: services
        run: python scripts/e2e_test.py

  android:
    name: Android · Gradle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: latest
      - name: Install Android SDK packages
        # The `packages:` input on setup-android@v3 passes the whole
        # newline-separated list to sdkmanager as one argv string, which
        # sdkmanager then tries to resolve as a single package name and
        # fails with "Failed to find package 'platforms;android-35\n...'".
        # Call sdkmanager ourselves with each package as a separate
        # quoted argument instead.
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platforms;android-35" \
            "build-tools;34.0.0" \
            "platform-tools"
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-
      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  # iPhone build runs on expensive macos-15 minutes, so (1) gate it on
  # paths that actually affect the build, and (2) cache DerivedData so
  # cold runs don't re-compile unchanged Swift.
  ios-changes:
    name: iPhone · detect changes
    runs-on: ubuntu-latest
    outputs:
      touched: ${{ steps.filter.outputs.touched }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            touched:
              - 'apple/**'
              - '.github/workflows/ci.yml'

  ios:
    name: iPhone · Xcode build
    runs-on: macos-15
    needs: ios-changes
    if: needs.ios-changes.outputs.touched == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcode-select -p
      - name: Cache DerivedData
        # Key on the project file + every Swift source + Info.plist +
        # asset catalog, so an identical tree restores a warm build.
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ios-deriveddata-${{ runner.os }}-${{ hashFiles('apple/Remotex.xcodeproj/project.pbxproj', 'apple/Remotex/**/*.swift', 'apple/Remotex/Info.plist', 'apple/Remotex/Assets.xcassets/**') }}
          restore-keys: ios-deriveddata-${{ runner.os }}-
      - name: Build iPhone simulator app
        run: |
          set -o pipefail
          xcodebuild \
            -project apple/Remotex.xcodeproj \
            -scheme Remotex \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
