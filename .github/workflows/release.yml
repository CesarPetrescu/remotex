name: Release

# Runs on two triggers:
#   - push to main  → updates a rolling `nightly` prerelease so
#                     anyone can grab the bleeding binaries without login
#   - push of a tag → creates a stable release with the tagged binaries
# The stable release is the one people should normally install.
#
# Publishes two artifacts per release:
#   - remotex-<label>.apk      Android debug APK
#   - remotex-<label>.ipa      Unsigned iOS IPA (no Apple signing)
#
# The .ipa is *unsigned*: it can't be installed on a regular iPhone
# through stock iOS. Use a re-signing sideloader (AltStore, Sideloadly
# with a free Apple ID, TrollStore on supported iOS versions) to land
# it on a real device.

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Decide per-platform whether this push/PR actually changed code.
  # Tag pushes skip the filter and rebuild both — a stable release
  # should always ship every platform.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
      ios: ${{ steps.filter.outputs.ios }}
      is_tag: ${{ startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            android:
              - 'android/**'
              - '.github/workflows/release.yml'
            ios:
              - 'apple/**'
              - '.github/workflows/release.yml'

  android:
    name: Android · build + publish APK
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.is_tag == 'true' ||
      needs.changes.outputs.android == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: latest
      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platforms;android-35" \
            "build-tools;34.0.0" \
            "platform-tools"
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Derive release label
        id: label
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            label="${GITHUB_REF_NAME}"
          else
            label="nightly-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          fi
          echo "label=$label" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace \
            -PversionName="${{ steps.label.outputs.label }}"
      - name: Rename APK with version label
        run: |
          src=android/app/build/outputs/apk/debug/app-debug.apk
          dst="android/app/build/outputs/apk/debug/remotex-${{ steps.label.outputs.label }}.apk"
          cp "$src" "$dst"
          echo "artifact=$dst" >> "$GITHUB_ENV"

      - name: Publish nightly (main branch)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly (latest main)
          body: |
            Latest debug builds from `main`.

            - Android APK: debug-signed, sideload via `adb install` or
              tap the file after transferring it to the device.
            - iOS IPA: *unsigned*. Sideload with AltStore, Sideloadly
              (free Apple ID), or TrollStore on supported iOS versions.
            - Use the tagged releases for anything stable.

            Built from commit `${{ steps.label.outputs.short_sha }}`.
          prerelease: true
          files: ${{ env.artifact }}

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ env.artifact }}

  ios:
    name: iOS · build + publish unsigned IPA
    runs-on: macos-15
    needs: changes
    if: |
      needs.changes.outputs.is_tag == 'true' ||
      needs.changes.outputs.ios == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Show Xcode version
        run: xcodebuild -version

      - name: Derive release label
        id: label
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            label="${GITHUB_REF_NAME}"
          else
            label="nightly-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          fi
          echo "label=$label" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ios-release-deriveddata-${{ runner.os }}-${{ hashFiles('apple/Remotex.xcodeproj/project.pbxproj', 'apple/Remotex/**/*.swift', 'apple/Remotex/Info.plist', 'apple/Remotex/Assets.xcassets/**') }}
          restore-keys: ios-release-deriveddata-${{ runner.os }}-

      - name: Build unsigned device .app
        # Release config + iphoneos SDK so it's a real-device slice
        # (arm64, not simulator). No Apple team / cert is needed
        # because every signing setting is wiped; Xcode skips the
        # codesign + entitlements phases entirely.
        run: |
          set -o pipefail
          xcodebuild \
            -project apple/Remotex.xcodeproj \
            -scheme Remotex \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            build

      - name: Package unsigned IPA
        # An .ipa is just a zip of Payload/<app>. No codesign step.
        run: |
          app_dir="build/Build/Products/Release-iphoneos/Remotex.app"
          test -d "$app_dir" || { echo "missing $app_dir"; exit 1; }
          staging="$(mktemp -d)"
          mkdir -p "$staging/Payload"
          cp -R "$app_dir" "$staging/Payload/"
          out="build/remotex-${{ steps.label.outputs.label }}.ipa"
          (cd "$staging" && zip -qry "$GITHUB_WORKSPACE/$out" Payload)
          echo "artifact=$out" >> "$GITHUB_ENV"
          ls -lh "$out"

      - name: Publish nightly (main branch)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly (latest main)
          body: |
            Latest builds from `main`.

            - Android APK: debug-signed, sideload via `adb install`.
            - iOS IPA: *unsigned*. Sideload with AltStore, Sideloadly
              (free Apple ID), or TrollStore on supported iOS versions.
            - Use the tagged releases for anything stable.

            Built from commit `${{ steps.label.outputs.short_sha }}`.
          prerelease: true
          files: ${{ env.artifact }}

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ env.artifact }}
