[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["__pycache__", ".venv"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "B",   # flake8-bugbear
]
ignore = [
    "E501",  # line too long (soft enforced via formatter)
    "B008",  # function calls in default args — aiohttp idiom
]

[tool.ruff.lint.isort]
known-first-party = ["daemon", "relay"]

[tool.ruff.format]
quote-style = "double"
