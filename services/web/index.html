<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Remotex — Control</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* OLED-dark palette — cyan/teal accents on near-black surfaces. */
    --bg: #050910;
    --panel: #0a1120;
    --panel-2: #121a2c;
    --line: #1d2940;
    --ink: #e3edfa;
    --ink-dim: #88a4c4;
    --amber: #5ee1ff;
    --ok: #6ae0c2;
    --warn: #ff7070;
    --accent: #3aa0e8;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --sans: 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--ink); font-family: var(--sans); }
  body { display: flex; flex-direction: column; }
  a { color: var(--amber); }
  button, input, select {
    font-family: var(--mono); font-size: 12px; background: var(--panel-2);
    color: var(--ink); border: 1px solid var(--line); border-radius: 4px;
    padding: 6px 10px;
  }
  button { cursor: pointer; }
  button:hover:not(:disabled) { border-color: var(--amber); color: var(--amber); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  input { width: 100%; }
  header.bar {
    display: flex; align-items: center; gap: 12px; padding: 10px 16px;
    background: var(--panel); border-bottom: 1px solid var(--line);
  }
  header .brand { font-family: var(--mono); font-weight: 700; color: var(--amber); letter-spacing: .06em; }
  header .status { font-family: var(--mono); font-size: 11px; color: var(--ink-dim); margin-left: auto; }
  header .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; background: var(--ink-dim); }
  header .dot.ok { background: var(--ok); }
  header .dot.warn { background: var(--warn); }

  main { display: grid; grid-template-columns: 260px 1fr; gap: 0; flex: 1; min-height: 0; }
  @media (max-width: 720px) { main { grid-template-columns: 1fr; } aside { border-right: none !important; border-bottom: 1px solid var(--line); max-height: 200px; } }

  aside {
    background: var(--panel); border-right: 1px solid var(--line);
    padding: 14px; overflow: auto; display: flex; flex-direction: column; gap: 12px;
  }
  aside h3 {
    margin: 0 0 6px; font-family: var(--mono); font-size: 10px; letter-spacing: .1em;
    color: var(--ink-dim); text-transform: uppercase;
  }
  .auth-box { display: flex; flex-direction: column; gap: 6px; }
  .auth-box label { font-family: var(--mono); font-size: 10px; color: var(--ink-dim); }
  .hosts { display: flex; flex-direction: column; gap: 6px; }
  .host {
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 4px;
    padding: 8px 10px; cursor: pointer; font-family: var(--mono); font-size: 11px;
  }
  .host:hover { border-color: var(--amber); }
  .host.selected { border-color: var(--amber); background: #1d1f25; }
  .host .nick { color: var(--ink); font-weight: 600; }
  .host .sub { color: var(--ink-dim); font-size: 10px; margin-top: 2px; }
  .host .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; background: var(--ink-dim); }
  .host .dot.ok { background: var(--ok); }

  section.feed {
    display: flex; flex-direction: column; min-height: 0; position: relative;
  }
  .meta {
    font-family: var(--mono); font-size: 10px; color: var(--ink-dim);
    padding: 8px 16px; border-bottom: 1px dashed var(--line); background: var(--panel);
  }
  .stream {
    flex: 1; overflow: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px;
    font-family: var(--mono); font-size: 12px; line-height: 1.5;
  }
  .item { padding-left: 10px; border-left: 2px solid var(--line); }
  .item .lbl { font-size: 10px; color: var(--ink-dim); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 2px; }
  .item.user { border-left-color: var(--ink-dim); }
  .item.reason { border-left-color: #555; color: var(--ink-dim); font-style: italic; }
  .item.tool { border-left-color: #5f8fb0; }
  .item.tool pre { margin: 4px 0 0; background: var(--panel-2); padding: 6px 8px; border-radius: 3px; white-space: pre-wrap; color: var(--ink); }
  .item.agent { border-left-color: var(--amber); }
  .item.agent .lbl { color: var(--amber); }
  .cursor { display: inline-block; width: 6px; height: 12px; background: var(--amber); margin-left: 2px; vertical-align: text-bottom; animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  form.composer {
    display: flex; gap: 8px; padding: 10px 16px; background: var(--panel); border-top: 1px solid var(--line);
  }
  form.composer input { flex: 1; }
  form.composer button { min-width: 80px; }

  .empty { color: var(--ink-dim); font-family: var(--mono); font-size: 12px; padding: 20px; text-align: center; }
  .toast {
    position: fixed; right: 16px; bottom: 16px; padding: 10px 14px; background: var(--panel-2);
    border: 1px solid var(--warn); border-radius: 4px; color: var(--warn);
    font-family: var(--mono); font-size: 12px; max-width: 320px;
  }
</style>
</head>
<body>
<header class="bar">
  <span class="brand">REMOTEX</span>
  <span class="status"><span class="dot" id="statusDot"></span><span id="statusText">disconnected</span></span>
</header>

<main>
  <aside>
    <div class="auth-box">
      <label for="userToken">User token</label>
      <input id="userToken" placeholder="demo-user-token" value="demo-user-token">
      <button id="btnLoad">Load hosts</button>
    </div>
    <div>
      <h3>Hosts</h3>
      <div id="hosts" class="hosts"></div>
    </div>
    <div>
      <h3>Session</h3>
      <button id="btnOpen" disabled>Open session</button>
    </div>
  </aside>

  <section class="feed">
    <div class="meta" id="meta">no session</div>
    <div class="stream" id="stream">
      <div class="empty">Load hosts, pick one, open a session.</div>
    </div>
    <form class="composer" id="composer" onsubmit="return false;">
      <input id="prompt" placeholder="ask codex…" disabled autocomplete="off">
      <button id="send" disabled>Send</button>
    </form>
  </section>
</main>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const state = {
    userToken: "demo-user-token",
    hosts: [],
    selectedHost: null,
    ws: null,
    sessionId: null,
    pendingItems: new Map(),
  };

  function api(path, opts = {}) {
    return fetch(path, {
      ...opts,
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${state.userToken}`,
        ...(opts.headers || {}),
      },
    }).then(async (r) => {
      if (!r.ok) throw new Error(`${r.status} ${r.statusText}: ${await r.text()}`);
      return r.json();
    });
  }

  function setStatus(kind, text) {
    $("statusDot").className = "dot " + (kind || "");
    $("statusText").textContent = text;
  }

  function toast(msg) {
    const el = document.createElement("div");
    el.className = "toast"; el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }

  function renderHosts() {
    const box = $("hosts");
    box.innerHTML = "";
    if (state.hosts.length === 0) {
      box.innerHTML = '<div class="empty">no hosts yet</div>';
      return;
    }
    state.hosts.forEach((h) => {
      const el = document.createElement("div");
      el.className = "host" + (state.selectedHost === h.id ? " selected" : "");
      el.innerHTML = `
        <div><span class="dot ${h.online ? 'ok' : ''}"></span>
        <span class="nick">${escapeHtml(h.nickname)}</span></div>
        <div class="sub">${escapeHtml(h.hostname || '—')} · ${h.online ? 'online' : 'offline'}</div>`;
      el.addEventListener("click", () => {
        state.selectedHost = h.id;
        renderHosts();
        $("btnOpen").disabled = !h.online;
      });
      box.appendChild(el);
    });
  }

  function escapeHtml(s) {
    return String(s || "").replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  $("btnLoad").addEventListener("click", async () => {
    state.userToken = $("userToken").value.trim() || "demo-user-token";
    try {
      const { hosts } = await api("/api/hosts");
      state.hosts = hosts;
      renderHosts();
    } catch (err) {
      toast(err.message);
    }
  });

  $("btnOpen").addEventListener("click", async () => {
    if (!state.selectedHost) return;
    try {
      const { session_id } = await api("/api/sessions", {
        method: "POST",
        body: JSON.stringify({ host_id: state.selectedHost }),
      });
      state.sessionId = session_id;
      connectWs();
    } catch (err) {
      toast(err.message);
    }
  });

  function connectWs() {
    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    const url = `${proto}//${location.host}/ws/client`;
    const ws = new WebSocket(url);
    state.ws = ws;
    setStatus("", "connecting…");
    ws.onopen = () => {
      ws.send(JSON.stringify({
        type: "hello", token: state.userToken, session_id: state.sessionId,
      }));
    };
    ws.onclose = () => { setStatus("warn", "disconnected"); state.ws = null; disableComposer(); };
    ws.onerror = () => toast("websocket error");
    ws.onmessage = (ev) => {
      let msg;
      try { msg = JSON.parse(ev.data); } catch { return; }
      onFrame(msg);
    };
  }

  function disableComposer() {
    $("prompt").disabled = true; $("send").disabled = true;
  }

  function onFrame(msg) {
    if (msg.type === "attached") {
      setStatus("ok", `connected · ${msg.host_id}`);
      $("meta").textContent = `session ${msg.session_id} on ${msg.host_id}`;
      $("stream").innerHTML = "";
      enableComposer();
      return;
    }
    if (msg.type === "error") {
      toast("relay: " + msg.error);
      return;
    }
    if (msg.type === "session-closed") {
      setStatus("warn", "session closed");
      disableComposer();
      return;
    }
    if (msg.type !== "session-event") return;
    const ev = msg.event || {}; const data = ev.data || {};
    const kind = ev.kind;
    if (kind === "session-started") {
      $("meta").textContent = `${$("meta").textContent} · ${data.model || ''} · ${data.cwd || ''}`;
    } else if (kind === "turn-started") {
      appendUserItem(data.input);
    } else if (kind === "item-started") {
      startItem(data);
    } else if (kind === "item-delta") {
      appendDelta(data);
    } else if (kind === "item-completed") {
      completeItem(data);
    } else if (kind === "turn-completed") {
      enableComposer();
    }
  }

  function appendUserItem(text) {
    const div = document.createElement("div");
    div.className = "item user";
    div.innerHTML = `<div class="lbl">user</div><div>${escapeHtml(text)}</div>`;
    $("stream").appendChild(div); scrollBottom();
  }

  function startItem(data) {
    const id = data.item_id;
    const kind = data.item_type === "agent_reasoning" ? "reason"
      : data.item_type === "tool_call" ? "tool"
      : data.item_type === "agent_message" ? "agent"
      : "item";
    const label = data.item_type === "tool_call" && data.tool
      ? `tool · ${data.tool}`
      : data.item_type.replace("_", " ");
    const div = document.createElement("div");
    div.className = "item " + kind;
    div.dataset.itemId = id;
    const body = document.createElement("div");
    body.className = "body";
    if (data.item_type === "tool_call" && data.args) {
      body.innerHTML = `<pre>${escapeHtml(data.args.command || JSON.stringify(data.args))}</pre>`;
    } else if (data.item_type === "agent_message") {
      body.appendChild(document.createTextNode(""));
      body.insertAdjacentHTML("beforeend", '<span class="cursor"></span>');
    }
    div.innerHTML = `<div class="lbl">${escapeHtml(label)}</div>`;
    div.appendChild(body);
    $("stream").appendChild(div);
    state.pendingItems.set(id, { el: div, body, kind: data.item_type });
    scrollBottom();
  }

  function appendDelta(data) {
    const it = state.pendingItems.get(data.item_id);
    if (!it || it.kind !== "agent_message") return;
    const cursor = it.body.querySelector(".cursor");
    const txt = document.createTextNode(data.delta);
    it.body.insertBefore(txt, cursor);
    scrollBottom();
  }

  function completeItem(data) {
    const it = state.pendingItems.get(data.item_id);
    if (!it) return;
    if (data.item_type === "agent_reasoning") {
      it.body.textContent = data.text || "";
    } else if (data.item_type === "tool_call") {
      const out = document.createElement("pre");
      out.textContent = data.output || "";
      out.style.opacity = "0.8";
      it.body.appendChild(out);
    } else if (data.item_type === "agent_message") {
      const cursor = it.body.querySelector(".cursor");
      if (cursor) cursor.remove();
    }
    state.pendingItems.delete(data.item_id);
  }

  function enableComposer() {
    $("prompt").disabled = false; $("send").disabled = false; $("prompt").focus();
  }

  function scrollBottom() {
    const s = $("stream"); s.scrollTop = s.scrollHeight;
  }

  $("send").addEventListener("click", sendTurn);
  $("prompt").addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendTurn(); } });

  function sendTurn() {
    const text = $("prompt").value.trim();
    if (!text || !state.ws) return;
    state.ws.send(JSON.stringify({ type: "turn-start", input: text }));
    $("prompt").value = "";
    $("send").disabled = true; $("prompt").disabled = true;
  }

  // auto-load on page open
  $("btnLoad").click();
})();
</script>
</body>
</html>
